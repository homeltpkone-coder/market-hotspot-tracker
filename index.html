<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>全球资本市场热点追踪</title>
  <style>
    body{margin:0;background:#eef3f8;color:#172033;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif}
    header{position:sticky;top:0;background:#eef3f8e8;border-bottom:1px solid #dbe3ef;padding:18px 28px;display:flex;justify-content:space-between;gap:16px}
    h1{margin:0;font-size:28px}
    main{max-width:1180px;margin:18px auto;padding:0 14px}
    .panel,.hero{background:white;border:1px solid #dbe3ef;border-radius:10px;padding:18px;margin:16px 0;box-shadow:0 10px 28px #243b5314}
    .hero{display:grid;grid-template-columns:1.4fr .8fr;gap:18px}
    h2{font-size:34px;margin:0}
    .muted{color:#64748b}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .row,.card,.box{border:1px solid #dbe3ef;border-radius:8px;background:#fbfdff;padding:12px;margin:8px 0}
    .row{display:grid;grid-template-columns:1fr auto auto;gap:12px}
    .up{color:#dc2626}.down{color:#059669}
    .themes{display:grid;grid-template-columns:repeat(5,minmax(180px,1fr));gap:12px;overflow-x:auto}
    .score{display:inline-flex;width:44px;height:44px;border-radius:50%;background:#dbeafe;color:#1d4ed8;align-items:center;justify-content:center;font-weight:800}
    .badge{background:#eef2ff;color:#3730a3;border-radius:999px;padding:4px 8px;font-size:12px;font-weight:700}
    input,button{border:1px solid #dbe3ef;border-radius:8px;padding:10px;background:white}
    button{font-weight:700}.form{display:flex;gap:10px;flex-wrap:wrap}.form input{flex:1;min-width:180px}
    @media(max-width:820px){.hero,.grid{grid-template-columns:1fr}h2{font-size:24px}.row{grid-template-columns:1fr auto}}
  </style>
</head>
<body>
<header>
  <div>
    <div class="muted">Global Market Hotspot Tracker</div>
    <h1>全球资本市场热点追踪</h1>
  </div>
  <button onclick="load()">刷新</button>
</header>

<main>
  <section class="hero">
    <div>
      <div class="muted">今日主线</div>
      <h2 id="headline">正在读取数据...</h2>
      <p id="time" class="muted"></p>
    </div>
    <div>
      <div class="box">美股科技：<b id="us">--</b></div>
      <div class="box">A股成长：<b id="cn">--</b></div>
      <div class="box">资金验证：<b id="cap">--</b></div>
    </div>
  </section>

  <section class="grid">
    <div class="panel"><h3>主要指数</h3><div id="idx"></div></div>
    <div class="panel"><h3>美股科技权重</h3><div id="stk"></div></div>
  </section>

  <section class="panel">
    <h3>热点主题评分</h3>
    <div id="themes" class="themes"></div>
  </section>

  <section class="panel">
    <h3>个股 / 公司智能分析</h3>
    <div class="form">
      <input id="symbol" placeholder="例如 NVDA / AMD / MSFT / AAPL">
      <button onclick="analyze()">分析</button>
    </div>
    <div id="analysis"></div>
  </section>

  <section class="grid">
    <div class="panel">
      <h3>X / 雪球资讯雷达</h3>
      <div class="box">X：后续接入白名单账号，追踪 AI、半导体、机器人海外观点。</div>
      <div class="box">雪球：后续接入关注列表，追踪 A 股产业链讨论和情绪扩散。</div>
      <div class="box">规则：社交观点必须被行情、公告、财报、研报或新闻验证。</div>
    </div>
    <div class="panel">
      <h3>观察清单</h3>
      <div class="box">1. 美股半导体是否继续强于纳指。</div>
      <div class="box">2. A 股算力链是否放量。</div>
      <div class="box">3. 机器人是否进入订单和量产验证。</div>
    </div>
  </section>
</main>

<script>
let data = null;
const fmt = new Intl.NumberFormat("zh-CN",{maximumFractionDigits:2});
const money = new Intl.NumberFormat("zh-CN",{notation:"compact",maximumFractionDigits:2});

function cls(v){v=Number(v||0);return v>0?"up":v<0?"down":""}

function row(i){
  return '<div class="row"><div><b>'+i.name+'</b><div class="muted">'+i.code+'</div></div><b>'+fmt.format(i.price)+'</b><b class="'+cls(i.pct)+'">'+(i.pct>0?"+":"")+fmt.format(i.pct)+'%</b><div class="muted">成交额 '+money.format(i.amount||0)+'</div></div>';
}

async function load(){
  try {
    const r = await fetch("data/snapshot.json?ts=" + Date.now());
    data = await r.json();

    const semi = data.tech.filter(s=>["NVDA","AMD","AVGO","MU"].includes(s.code));
    const avg = semi.reduce((a,s)=>a+Number(s.pct||0),0)/Math.max(1,semi.length);
    const cyb = data.indices.find(i=>i.code==="399006");

    headline.textContent = avg>2
      ? "AI 芯片继续牵引全球科技主线，A 股重点看算力链资金确认"
      : "科技线处于结构性分化，重点看资金是否回到硬件链条";

    time.textContent = "更新时间：" + new Date(data.asOf).toLocaleString("zh-CN",{hour12:false});
    us.textContent = avg>2 ? "强" : avg>0 ? "中强" : "分化";
    cn.textContent = Number(cyb?.pct||0)<-1 ? "分化" : "观察";
    cap.textContent = avg>2 ? "美股确认" : "等待验证";

    idx.innerHTML = data.indices.map(row).join("");
    stk.innerHTML = data.tech.map(row).join("");
    themes.innerHTML = data.themes.map(t =>
      '<div class="card"><div class="score">'+t.score+'</div><h4>'+t.name+'</h4><span class="badge">'+t.capital+" · "+t.heat+'</span><p class="muted">'+t.chain+"</p></div>"
    ).join("");
  } catch(e) {
    headline.textContent = "数据暂时不可用，请稍后刷新";
    time.textContent = e.message;
  }
}

function analyze(){
  const q = symbol.value.trim().toUpperCase();
  const all = [...(data?.tech||[]), ...(data?.indices||[])];
  const s = all.find(x=>x.code===q || x.name.toUpperCase().includes(q));

  if(!s){
    analysis.innerHTML = '<div class="box">当前版本未找到 '+q+'。正式版将接入 A股、美股、港股全市场查询。</div>';
    return;
  }

  analysis.innerHTML =
    '<div class="box"><b>综合结论</b><p>'+s.name+' 当前涨跌幅 <span class="'+cls(s.pct)+'">'+(s.pct>0?"+":"")+fmt.format(s.pct)+'%</span>。若成交额持续放大且强于所属主题，资金确认度提高；若弱于主题或指数，说明仍需验证。</p></div>' +
    '<div class="box"><b>量价与K线</b><p>当前成交额 '+money.format(s.amount||0)+'。后续版本将加入 5日/20日均量、均线、压力位和支撑位。</p></div>' +
    '<div class="box"><b>基本面与行业</b><p>若属于 AI、半导体、机器人链条，需要结合财报、订单、Capex、研报和公告验证。</p></div>';
}

load();
</script>
</body>
</html>
